<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ハチーダーコリー</title>
    <link rel="icon" type="image/png" href="WWWWWWWW.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#FFD1DC">
    <meta name="title" content="ハチーダーコリー"/>
    <meta name="description" content="Get to know me!"/>

    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://hachidacollie.github.io/dacollie/"/>
    <meta property="og:title" content="ハチーダーコリー"/>
    <meta property="og:description" content="Get to know me!"/>
    <meta property="og:image" content="mypfp.png"/>

    <meta property="twitter:card" content="summary"/>
    <meta property="twitter:url" content="https://hachidacollie.github.io/dacollie/"/>
    <meta property="twitter:title" content="ハチーダーコリー"/>
    <meta property="twitter:description" content="Get to know me!"/>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="sakura" aria-hidden="true"></canvas>

    <main class="page">
        <header class="hero">
            <div class="pfp-stage">
                <div class="pfp-ring" aria-hidden="true"></div>
                <div class="pfp-glow" aria-hidden="true"></div>
                <img id="me" class="pfp" src="mypfp.png" alt="Hachi the collie"/>
                <div class="speech-bubble" id="bubble">tap me!</div>
            </div>

            <h1 class="title" aria-label="Hachidacollie">
                <span>H</span><span>a</span><span>c</span><span>h</span><span>i</span><span>d</span><span>a</span><span>c</span><span>o</span><span>l</span><span>l</span><span>i</span><span>e</span><span>!</span>
            </h1>
            <p class="subtitle">ハチーダーコリー</p>

            <ul class="chips" aria-label="about me">
                <li class="chip">🐕 collie</li>
                <li class="chip">🎂 26</li>
                <li class="chip">🇹🇭 Thailand</li>
            </ul>
        </header>

        <section class="bio">
            <p>Hi, I'm <b>Hachi</b> 🐾 a fluffy little collie based in Thailand.</p>
            <p>I live for weekend trips, sunny afternoons, and meeting new friends. If any of that sounds fun — slide into my DMs anywhere below ♡</p>
        </section>

        <section class="socials" aria-label="contact">
            <h2 class="section-label">find me</h2>

            <div class="social-stack">
                <button class="pill pill-hero" data-url="https://barq.app/@hachidacollie" style="--accent:#FF7A59">
                    <span class="pill-icon barq-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 5h7a4 4 0 0 1 0 8H6v6H4z M11 11h2a3 3 0 0 1 0 6h-3" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="pill-hero-text">
                        <span class="pill-hero-title">Barq</span>
                        <span class="pill-hero-sub">@hachidacollie</span>
                    </span>
                </button>

                <button class="pill pill-hero" data-url="https://twitter.com/hachidacollie" style="--accent:#1DA1F2">
                    <img class="pill-icon" src="twitter.png" alt="">
                    <span class="pill-hero-text">
                        <span class="pill-hero-title">Twitter</span>
                        <span class="pill-hero-sub">@hachidacollie</span>
                    </span>
                </button>

                <button class="pill pill-hero" data-url="https://www.facebook.com/hachix2" style="--accent:#1877F2">
                    <img class="pill-icon" src="facebook.png" alt="">
                    <span class="pill-hero-text">
                        <span class="pill-hero-title">Facebook</span>
                        <span class="pill-hero-sub">@hachix2</span>
                    </span>
                </button>

                <button class="pill pill-hero" data-url="https://t.me/hachidacollie" style="--accent:#26A5E4">
                    <img class="pill-icon" src="telegram.png" alt="">
                    <span class="pill-hero-text">
                        <span class="pill-hero-title">Telegram</span>
                        <span class="pill-hero-sub">@hachidacollie</span>
                    </span>
                </button>
            </div>
        </section>

        <footer class="footer">made with ♡ &amp; 🐾</footer>
    </main>

    <div id="paw-layer" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>
</html>
